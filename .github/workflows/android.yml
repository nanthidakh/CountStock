name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:


jobs:
  build:

    runs-on: ubuntu-22.04

    steps:


      # ==========================
      # Checkout Source
      # ==========================
      - name: Checkout
        uses: actions/checkout@v4



      # ==========================
      # Install Dependencies
      # ==========================
      - name: Install dependencies
        run: |

          sudo apt-get update

          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev


          python3 -m pip install --upgrade pip


          pip install \
            buildozer==1.5.0 \
            Cython==0.29.36 \
            python-for-android==2024.01.21



      # ==========================
      # Java 17
      # ==========================
      - name: Set Java 17
        run: |

          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH



      # ==========================
      # Android SDK
      # ==========================
      - name: Setup Android SDK
        shell: bash
        run: |


          echo "ANDROID_HOME=$ANDROID_HOME"


          SDKMANAGER=$(find $ANDROID_HOME -name sdkmanager | head -n 1)


          if [ -z "$SDKMANAGER" ]; then
              echo "sdkmanager not found"
              exit 1
          fi


          echo "$(dirname $SDKMANAGER)" >> $GITHUB_PATH


          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH



          yes | $SDKMANAGER --licenses || true



          $SDKMANAGER \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;25.2.9519653"




      # ==========================
      # Clean Buildozer
      # ==========================
      - name: Clean Buildozer
        run: |

          rm -rf ~/.buildozer

          rm -rf .buildozer


          mkdir -p ~/.buildozer/android/platform



      # ==========================
      # Link Android SDK
      # ==========================
      - name: Link Android SDK
        run: |


          ln -s \
          $ANDROID_HOME \
          ~/.buildozer/android/platform/android-sdk




      # ==========================
      # Link Android NDK
      # ==========================
      - name: Link Android NDK
        run: |


          ln -s \
          $ANDROID_HOME/ndk/25.2.9519653 \
          ~/.buildozer/android/platform/android-ndk-r25.2.9519653




      # ==========================
      # Verify
      # ==========================
      - name: Verify Android Setup
        run: |


          echo "===== SDK ====="

          ls -la ~/.buildozer/android/platform/android-sdk


          echo "===== NDK ====="

          ls -la ~/.buildozer/android/platform/android-ndk-r25.2.9519653



          echo "===== Build Tools ====="

          ls $ANDROID_HOME/build-tools



          echo "===== AIDL ====="

          find $ANDROID_HOME -name aidl




      # ==========================
      # Build APK
      # ==========================
      - name: Build APK
        run: |

          buildozer -v android debug




      # ==========================
      # Upload APK
      # ==========================
      - name: Upload APK
        uses: actions/upload-artifact@v4

        with:

          name: CountStock-APK

          path: bin/*.apk