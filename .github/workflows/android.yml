name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:


jobs:

  build:

    runs-on: ubuntu-22.04


    steps:


      - name: Checkout
        uses: actions/checkout@v4



      - name: Install dependencies
        run: |

          sudo apt update

          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libffi-dev \
            libssl-dev


          pip install --upgrade pip


          pip install \
            buildozer==1.5.0 \
            Cython==0.29.36




      - name: Setup Android SDK
        run: |


          SDKMANAGER=$(find $ANDROID_HOME -name sdkmanager | head -1)


          echo "$(dirname $SDKMANAGER)" >> $GITHUB_PATH



          yes | $SDKMANAGER --licenses || true



          $SDKMANAGER \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;25.2.9519653"




      - name: Configure Buildozer
        run: |


          mkdir -p ~/.buildozer/android/platform


          ln -s \
          $ANDROID_HOME \
          ~/.buildozer/android/platform/android-sdk



          ln -s \
          $ANDROID_HOME/ndk/25.2.9519653 \
          ~/.buildozer/android/platform/android-ndk-r25b



      - name: Clean project cache
        run: |

          rm -rf .buildozer



      - name: Build APK
        env:

          ANDROID_HOME: ${{ env.ANDROID_HOME }}

          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

        run: |

          buildozer -v android debug



      - name: Upload APK
        uses: actions/upload-artifact@v4

        with:

          name: CountStock-APK

          path: bin/*.apk