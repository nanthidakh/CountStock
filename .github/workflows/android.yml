name: Build APK

on:
  push:
    branches:
      - main

  workflow_dispatch:


jobs:

  build:

    runs-on: ubuntu-22.04


    steps:


      # ==========================
      # Checkout
      # ==========================
      - name: Checkout Source
        uses: actions/checkout@v4



      # ==========================
      # Linux Dependencies
      # ==========================
      - name: Install Dependencies
        run: |

          sudo apt-get update


          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev



          python3 -m pip install --upgrade pip


          pip install \
            buildozer==1.5.0 \
            Cython==0.29.36





      # ==========================
      # Java
      # ==========================
      - name: Setup Java 17
        run: |

          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH





      # ==========================
      # Android SDK
      # ==========================
      - name: Setup Android SDK
        shell: bash
        run: |


          echo "ANDROID_HOME=$ANDROID_HOME"



          SDKMANAGER=$(find $ANDROID_HOME -name sdkmanager | head -n 1)



          if [ -z "$SDKMANAGER" ]; then

            echo "sdkmanager not found"

            exit 1

          fi



          echo "$(dirname $SDKMANAGER)" >> $GITHUB_PATH

          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH




          yes | $SDKMANAGER --licenses || true




          $SDKMANAGER \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;25.2.9519653"






      # ==========================
      # Clean
      # ==========================
      - name: Clean Buildozer Cache
        run: |


          rm -rf ~/.buildozer

          rm -rf .buildozer




      # ==========================
      # Prepare Buildozer Platform
      # ==========================
      - name: Configure Buildozer Android
        run: |


          mkdir -p .buildozer/android/platform




          ln -s \
          $ANDROID_HOME \
          .buildozer/android/platform/android-sdk




          ln -s \
          $ANDROID_HOME/ndk/25.2.9519653 \
          .buildozer/android/platform/android-ndk-r25b






      # ==========================
      # Verify
      # ==========================
      - name: Verify Android Environment
        run: |


          echo "===== PLATFORM ====="

          ls -la .buildozer/android/platform



          echo "===== SDK ====="

          ls -la .buildozer/android/platform/android-sdk



          echo "===== NDK ====="

          ls -la .buildozer/android/platform/android-ndk-r25b



          echo "===== BUILD TOOLS ====="

          ls $ANDROID_HOME/build-tools



          echo "===== AIDL ====="

          find $ANDROID_HOME -name aidl





      # ==========================
      # Build APK
      # ==========================
      - name: Build APK
        run: |


          buildozer -v android debug






      # ==========================
      # Upload
      # ==========================
      - name: Upload APK
        uses: actions/upload-artifact@v4

        with:

          name: CountStock-APK

          path: bin/*.apk