name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # อัปเกรด buildozer เป็นรุ่นล่าสุดเพื่อแก้ปัญหาเรื่องการดึง NDK เวอร์ชั่นใหม่
          pip install --upgrade buildozer
          pip install Cython==0.29.36

      - name: Build APK
        run: |
          # บังคับให้ Buildozer แสดงรายละเอียดแบบเต็ม
          # และใช้คำสั่ง clean เพื่อความมั่นใจว่าไม่มี Cache เก่าค้าง
          buildozer clean
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CountStock-APK
          path: bin/*.apk