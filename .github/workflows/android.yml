name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:


jobs:
  build:

    runs-on: ubuntu-22.04

    steps:

      # ==========================
      # Checkout Source
      # ==========================
      - name: Checkout
        uses: actions/checkout@v4


      # ==========================
      # Install Linux Dependencies
      # ==========================
      - name: Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev

          python3 -m pip install --upgrade pip

          pip install \
            buildozer==1.5.0 \
            Cython==0.29.36


      # ==========================
      # Setup Android SDK
      # ==========================
      - name: Setup Android SDK
        shell: bash
        run: |

          echo "ANDROID_HOME=$ANDROID_HOME"

          echo "Searching sdkmanager..."

          SDKMANAGER=$(find $ANDROID_HOME -name sdkmanager | head -n 1)

          if [ -z "$SDKMANAGER" ]; then
              echo "sdkmanager not found"
              exit 1
          fi


          echo "Found:"
          echo $SDKMANAGER


          SDK_PATH=$(dirname $SDKMANAGER)

          echo $SDK_PATH >> $GITHUB_PATH

          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH


          echo "Accept licenses"

          yes | $SDKMANAGER --licenses || true


          echo "Install Android packages"


          $SDKMANAGER \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"



      # ==========================
      # Verify Android Tools
      # ==========================
      - name: Check Android Tools
        run: |

          which sdkmanager

          sdkmanager --version

          echo "Build Tools:"
          ls $ANDROID_HOME/build-tools

          echo "AIDL:"
          find $ANDROID_HOME -name aidl



      # ==========================
      # Clear Buildozer Cache
      # ==========================
      - name: Clean Buildozer
        run: |

          rm -rf ~/.buildozer

          mkdir -p ~/.buildozer/android/platform


          ln -s \
          $ANDROID_HOME \
          ~/.buildozer/android/platform/android-sdk



      # ==========================
      # Build APK
      # ==========================
      - name: Build APK
        run: |

          buildozer -v android debug



      # ==========================
      # Upload APK
      # ==========================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:

          name: CountStock-APK

          path: bin/*.apk